version: '3.1'

services:
  locator:
    build: ./Locator-service
    volumes:
      - ./data:/app/data
    ports:
      - 7000:7000

  dummy:
    build: ./Dummy-service
    ports:
      - 7001:7001

  store:
    build: ./Store-service
    depends_on:
      store-migrate:
        condition: service_completed_successfully
      store-db:
        condition: service_healthy
    env_file: .env
    ports:
      - 7002:7002

  store-migrate:
    build:
      context: ./Store-service
      dockerfile: Dockerfile.goose
    env_file: .env
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: ${DB_URL}
    depends_on:
      store-db:
        condition: service_healthy
    command: goose up

  store-db:
    image: postgres:latest
    container_name: postgres
    env_file: .env
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - ./data/postgres_data:/app/data/postgres_data
    ports:
      - "5430:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
