version: '3.1'

services:
  locator:
    build: ./Locator-service
    volumes:
      - ./data:/app/data
    ports:
      - 7000:7000

  dummy:
    build: ./Dummy-service
    ports:
      - 7001:7001

  store:
    build: ./Store-service
    depends_on:
      store-migrate:
        condition: service_completed_successfully
      store-db:
        condition: service_healthy
    env_file: .env
    ports:
      - 7002:7002

  storage:
    build: ./Storage-service
    depends_on:
      storage-migrate:
        condition: service_completed_successfully
      storage-db:
        condition: service_healthy
    env_file: .env
    ports:
      - 7003:7003

  storage-migrate:
    build:
      context: ./Storage-service
      dockerfile: Dockerfile.goose
    env_file: .env
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: ${STORAGE_DB_URL}
    depends_on:
      storage-db:
        condition: service_healthy
    command: goose up

  store-migrate:
    build:
      context: ./Store-service
      dockerfile: Dockerfile.goose
    env_file: .env
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: ${STORE_DB_URL}
    depends_on:
      store-db:
        condition: service_healthy
    command: goose up

  storage-db:
    image: postgres:latest
    container_name: postgres_storage
    env_file: .env
    environment:
      - POSTGRES_USER=${STORAGE_DB_USER}
      - POSTGRES_PASSWORD=${STORAGE_DB_PASSWORD}
      - POSTGRES_DB=${STORAGE_DB_NAME}
    volumes:
      - ./data/storage_data:/app/data/postgres_data
    ports:
      - "5429:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STORAGE_DB_USER} -d ${STORAGE_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5


  store-db:
    image: postgres:latest
    container_name: postgres_store
    env_file: .env
    environment:
      - POSTGRES_USER=${STORE_DB_USER}
      - POSTGRES_PASSWORD=${STORE_DB_PASSWORD}
      - POSTGRES_DB=${STORE_DB_NAME}
    volumes:
      - ./data/store_data:/app/data/postgres_data
    ports:
      - "5430:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${STORE_DB_USER} -d ${STORE_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
